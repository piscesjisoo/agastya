<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기 | 빛의 아갈탄</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--bg-cream); }
    .auth-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 100px 20px 60px;
    }
    .auth-card {
      width: 100%; max-width: 440px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 40px;
      box-shadow: var(--shadow-sm);
    }
    .auth-logo { text-align: center; margin-bottom: 40px; }
    .auth-logo__main { font-family: 'Noto Serif KR',serif; font-size:1.05rem; font-weight:500; color:var(--navy); margin-bottom:2px; }
    .auth-logo__sub { font-family:'Cormorant Garamond',serif; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:20px; }
    .auth-logo__divider { width:40px; height:1px; background:var(--gold); margin:0 auto; }
    .auth-title { font-family:'Noto Serif KR',serif; font-size:1.2rem; font-weight:400; text-align:center; margin-bottom:12px; color:var(--text-dark); }
    .auth-desc { font-size:0.85rem; color:var(--text-mid); text-align:center; line-height:1.8; margin-bottom:28px; }
    /* 스텝 패널 */
    .fp-step { display: none; }
    .fp-step.active { display: block; }
    /* 코드 입력 */
    .code-inputs {
      display: flex; gap: 8px; justify-content: center; margin: 20px 0;
    }
    .code-input {
      width: 48px; height: 56px;
      border: 2px solid var(--border);
      border-radius: 4px;
      text-align: center;
      font-size: 1.4rem; font-weight: 600;
      color: var(--text-dark);
      outline: none;
      transition: var(--transition);
    }
    .code-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,151,58,0.1); }
    /* 타이머 */
    .timer {
      text-align: center; font-size: 0.85rem;
      color: var(--gold); margin-bottom: 16px; font-weight: 500;
    }
    /* EmailJS 안내 */
    .emailjs-notice {
      background: rgba(200,151,58,0.06);
      border: 1px solid var(--border-gold);
      border-radius: 4px;
      padding: 14px 16px;
      font-size: 0.8rem;
      color: var(--text-mid);
      margin-bottom: 20px;
      line-height: 1.7;
    }
    .emailjs-notice strong { color: var(--gold); }
    /* 완료 */
    .complete-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(200,151,58,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; margin: 0 auto 20px;
    }
    @media (max-width: 480px) { .auth-card { padding: 32px 20px; } }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html">
        <div class="auth-logo__main">빛의 아갈탄</div>
        <div class="auth-logo__sub">Agartan of Light: Agastya</div>
        <div class="auth-logo__divider"></div>
      </a>
    </div>

    <!-- STEP 1: 이메일 입력 -->
    <div class="fp-step active" id="fp-step1">
      <h2 class="auth-title">비밀번호 찾기</h2>
      <p class="auth-desc">가입 시 등록한 이메일을 입력하시면<br>6자리 인증 코드를 보내드립니다.</p>

      <div class="emailjs-notice">
        📧 <strong>이메일 인증 안내</strong><br>
        입력하신 이메일로 6자리 인증 코드를 보내드립니다.<br>
        스팸함도 확인해 주세요.
      </div>

      <div class="form-group">
        <label class="form-label">가입한 이메일 <span class="required">*</span></label>
        <input type="email" class="form-input" id="fp-email" placeholder="example@email.com">
        <div class="form-error" id="e-fp-email"></div>
      </div>
      <button class="btn btn--primary btn--full mt-8" id="send-code-btn" onclick="sendCode()">인증 코드 전송</button>
      <div style="text-align:center; margin-top:20px;">
        <a href="login.html" style="font-size:0.82rem; color:var(--text-light);">← 로그인으로 돌아가기</a>
      </div>
    </div>

    <!-- STEP 2: 코드 입력 -->
    <div class="fp-step" id="fp-step2">
      <h2 class="auth-title">인증 코드 확인</h2>
      <p class="auth-desc" id="fp-email-display">이메일로 전송된<br>6자리 코드를 입력해주세요.</p>

      <div class="code-inputs">
        <input type="text" class="code-input" maxlength="1" id="c0" oninput="moveNext(0)" onkeydown="movePrev(event,0)">
        <input type="text" class="code-input" maxlength="1" id="c1" oninput="moveNext(1)" onkeydown="movePrev(event,1)">
        <input type="text" class="code-input" maxlength="1" id="c2" oninput="moveNext(2)" onkeydown="movePrev(event,2)">
        <input type="text" class="code-input" maxlength="1" id="c3" oninput="moveNext(3)" onkeydown="movePrev(event,3)">
        <input type="text" class="code-input" maxlength="1" id="c4" oninput="moveNext(4)" onkeydown="movePrev(event,4)">
        <input type="text" class="code-input" maxlength="1" id="c5" oninput="moveNext(5)" onkeydown="movePrev(event,5)">
      </div>

      <div class="timer" id="timer">유효시간: 10:00</div>
      <div class="form-error text-center" id="e-code" style="text-align:center;"></div>

      <button class="btn btn--primary btn--full" onclick="verifyCode()">인증 확인</button>
      <button class="btn btn--outline btn--full mt-8" onclick="resendCode()">코드 재전송</button>
      <div style="text-align:center; margin-top:16px;">
        <a href="#" onclick="goStep(1)" style="font-size:0.82rem; color:var(--text-light);">이메일 다시 입력</a>
      </div>
    </div>

    <!-- STEP 3: 새 비밀번호 설정 -->
    <div class="fp-step" id="fp-step3">
      <h2 class="auth-title">새 비밀번호 설정</h2>
      <p class="auth-desc">새로운 비밀번호를 입력해주세요.</p>

      <div class="form-group">
        <label class="form-label">새 비밀번호 <span class="required">*</span></label>
        <input type="password" class="form-input" id="new-pw" placeholder="8자 이상 입력" minlength="8">
        <div class="form-error" id="e-new-pw"></div>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호 확인 <span class="required">*</span></label>
        <input type="password" class="form-input" id="new-pw2" placeholder="비밀번호 재입력">
        <div class="form-error" id="e-new-pw2"></div>
      </div>
      <button class="btn btn--primary btn--full mt-8" onclick="changePassword()">비밀번호 변경</button>
    </div>

    <!-- STEP 4: 완료 -->
    <div class="fp-step" id="fp-step4">
      <div style="text-align:center; padding: 20px 0;">
        <div class="complete-icon">✓</div>
        <h2 class="serif" style="font-size:1.3rem; margin-bottom:12px;">비밀번호가 변경되었습니다!</h2>
        <p style="color:var(--text-mid); font-size:0.88rem; margin-bottom:28px;">새로운 비밀번호로 로그인해 주세요.</p>
        <a href="login.html" class="btn btn--gold btn--full">로그인하기</a>
      </div>
    </div>
  </div>
</div>

<!-- EmailJS SDK (비밀번호 찾기 이메일 발송용) -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  /* ── EmailJS 설정 ── */
  // ⚠️ 아래 값을 EmailJS 계정에서 발급받은 키로 교체하세요
  const EMAILJS_CONFIG = {
    publicKey: 'xpy3QTLs8yi2VT1Ax',
    serviceId: 'agastya-kr',
    templateId: 'template_zgdvsie'
  };

  // EmailJS 초기화 (페이지 로드 시)
  emailjs.init({ publicKey: EMAILJS_CONFIG.publicKey });

  let currentStep = 1;
  let resetUserId = null;
  let generatedCode = '';
  let timerInterval = null;
  const userEmail = () => document.getElementById('fp-email').value.trim();

  function goStep(n) {
    document.querySelectorAll('.fp-step').forEach(el => el.classList.remove('active'));
    document.getElementById(`fp-step${n}`).classList.add('active');
    currentStep = n;
  }

  /* ── 6자리 코드 생성 ── */
  function generateCode() {
    return String(Math.floor(100000 + Math.random() * 900000));
  }

  /* ── 코드 전송 ── */
  async function sendCode() {
    const email = userEmail();
    const errEl = document.getElementById('e-fp-email');
    if (!email || !/\S+@\S+\.\S+/.test(email)) {
      errEl.textContent = '올바른 이메일을 입력해주세요.'; errEl.classList.add('show'); return;
    }
    errEl.classList.remove('show');

    const btn = document.getElementById('send-code-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:white;"></div> 전송 중...';

    generatedCode = generateCode();
    const result = await Auth.saveResetCode(email, generatedCode);

    if (!result.success) {
      Toast.show(result.message, 'error');
      btn.disabled = false; btn.textContent = '인증 코드 전송';
      return;
    }

    // EmailJS 전송
    try {
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
        to_email: email,
        to_name: result.name || '회원',
        reset_code: generatedCode,
        valid_minutes: '10'
      });
      Toast.show('인증 코드가 이메일로 전송되었습니다.', 'success');
    } catch (emailErr) {
      console.error('EmailJS 오류:', emailErr);
      Toast.show('이메일 전송에 실패했습니다. 잠시 후 다시 시도해주세요.', 'error');
      btn.disabled = false; btn.textContent = '인증 코드 전송';
      return;
    }

    resetUserId = result.userId;
    document.getElementById('fp-email-display').innerHTML =
      `<strong style="color:var(--text-dark);">${email}</strong>으로 전송된<br>6자리 코드를 입력해주세요.`;
    goStep(2);
    startTimer(10 * 60);

    btn.disabled = false;
    btn.textContent = '인증 코드 전송';
  }

  async function resendCode() {
    generatedCode = generateCode();
    await Auth.saveResetCode(userEmail(), generatedCode);
    [0,1,2,3,4,5].forEach(i => document.getElementById(`c${i}`).value = '');
    if (timerInterval) clearInterval(timerInterval);
    startTimer(10 * 60);

    try {
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
        to_email: userEmail(),
        to_name: '회원',
        reset_code: generatedCode,
        valid_minutes: '10'
      });
    } catch (e) {
      console.error('EmailJS 재전송 오류:', e);
      Toast.show('이메일 재전송에 실패했습니다.', 'error');
    }
    Toast.show('인증 코드를 재전송했습니다.', 'success');
  }

  /* ── 타이머 ── */
  function startTimer(seconds) {
    const el = document.getElementById('timer');
    let remaining = seconds;
    timerInterval = setInterval(() => {
      remaining--;
      const m = String(Math.floor(remaining / 60)).padStart(2, '0');
      const s = String(remaining % 60).padStart(2, '0');
      el.textContent = `유효시간: ${m}:${s}`;
      if (remaining <= 0) {
        clearInterval(timerInterval);
        el.textContent = '코드가 만료되었습니다. 다시 요청해주세요.';
        el.style.color = '#e53e3e';
        generatedCode = '';
      }
    }, 1000);
  }

  /* ── 코드 입력 UI ── */
  function moveNext(idx) {
    const el = document.getElementById(`c${idx}`);
    el.value = el.value.replace(/\D/g, '');
    if (el.value && idx < 5) document.getElementById(`c${idx+1}`).focus();
    // 6자리 다 입력되면 자동 확인
    const code = [0,1,2,3,4,5].map(i => document.getElementById(`c${i}`).value).join('');
    if (code.length === 6) verifyCode();
  }
  function movePrev(e, idx) {
    if (e.key === 'Backspace' && !document.getElementById(`c${idx}`).value && idx > 0)
      document.getElementById(`c${idx-1}`).focus();
  }

  /* ── 코드 검증 ── */
  async function verifyCode() {
    const code = [0,1,2,3,4,5].map(i => document.getElementById(`c${i}`).value).join('');
    const errEl = document.getElementById('e-code');
    if (code.length < 6) {
      errEl.textContent = '6자리 코드를 모두 입력해주세요.'; errEl.classList.add('show'); return;
    }

    // 로컬 검증 (또는 Auth.verifyResetCode 사용)
    if (code !== generatedCode) {
      errEl.textContent = '인증 코드가 올바르지 않습니다.'; errEl.classList.add('show');
      return;
    }
    errEl.classList.remove('show');
    if (timerInterval) clearInterval(timerInterval);
    Toast.show('인증 성공!', 'success');
    goStep(3);
  }

  /* ── 비밀번호 변경 ── */
  async function changePassword() {
    const pw = document.getElementById('new-pw').value;
    const pw2 = document.getElementById('new-pw2').value;
    const e1 = document.getElementById('e-new-pw');
    const e2 = document.getElementById('e-new-pw2');

    if (!pw || pw.length < 8) {
      e1.textContent = '비밀번호는 8자 이상이어야 합니다.'; e1.classList.add('show'); return;
    } else e1.classList.remove('show');

    if (pw !== pw2) {
      e2.textContent = '비밀번호가 일치하지 않습니다.'; e2.classList.add('show'); return;
    } else e2.classList.remove('show');

    const result = await Auth.changePassword(resetUserId, pw);
    if (result.success) {
      goStep(4);
    } else {
      Toast.show(result.message, 'error');
    }
  }
</script>
</body>
</html>
