<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서비스 상세 | 빛의 아갈탄</title>
  <meta name="description" content="빛의 아갈탄 서비스 상세 페이지">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── 히어로 ── */
    .svc-hero {
      position: relative; height: 480px; overflow: hidden;
      display: flex; align-items: flex-end;
    }
    .svc-hero__img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; object-position: center;
    }
    .svc-hero__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(10,17,40,0.35) 0%, rgba(10,17,40,0.72) 100%);
    }
    .svc-hero__content { position: relative; z-index: 2; padding: 0 0 56px; width: 100%; }
    .svc-hero__breadcrumb { font-size: 0.72rem; color: rgba(255,255,255,0.6); letter-spacing: 0.12em; margin-bottom: 16px; }
    .svc-hero__breadcrumb a { color: inherit; text-decoration: none; }
    .svc-hero__breadcrumb a:hover { color: var(--gold); }
    .svc-hero__num { font-size: 0.7rem; letter-spacing: 0.25em; color: var(--gold); margin-bottom: 12px; }
    .svc-hero__title { font-family: 'Noto Serif KR', serif; font-size: clamp(2rem,5vw,3.2rem); font-weight: 500; color: white; line-height: 1.25; margin-bottom: 16px; }
    .svc-hero__sub { font-size: 1rem; color: rgba(255,255,255,0.75); line-height: 1.8; max-width: 540px; }

    /* ── 본문 콘텐츠 ── */
    .svc-main { padding: 80px 0 120px; }
    .svc-lead { font-size: 1.05rem; color: var(--text-mid); line-height: 2.1; margin-bottom: 52px; max-width: 700px; }

    /* 섹션 블록 */
    .svc-section { margin-bottom: 52px; }
    .svc-section__num { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 6px; }
    .svc-section__title {
      font-family: 'Noto Serif KR', serif; font-size: 1.3rem; font-weight: 500;
      color: var(--navy); margin-bottom: 18px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .svc-section__body { font-size: 0.95rem; color: var(--text-mid); line-height: 2; }

    /* 박스 블록 (옆 선 스타일) */
    .svc-box {
      background: var(--bg-cream); border-left: 4px solid var(--gold);
      padding: 22px 26px; margin: 24px 0; border-radius: 0 8px 8px 0;
    }
    .svc-box__label { font-size: 0.68rem; letter-spacing: 0.18em; color: var(--gold); margin-bottom: 8px; }
    .svc-box__body { font-size: 0.9rem; color: var(--text-mid); line-height: 1.95; }

    /* Q&A 스타일 박스 */
    .svc-qa-box { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 18px 22px; margin: 12px 0; font-size: 0.88rem; color: var(--text-mid); line-height: 1.8; }
    .svc-qa-list { margin: 16px 0; }

    /* 구분선 */
    .svc-divider { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

    /* CTA */
    .svc-cta { background: var(--navy); padding: 56px 48px; border-radius: var(--radius); text-align: center; margin-top: 60px; }
    .svc-cta__title { font-family: 'Noto Serif KR', serif; font-size: 1.5rem; font-weight: 500; color: white; margin-bottom: 14px; }
    .svc-cta__sub { font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.9; margin-bottom: 28px; }

    /* ── 어드민 편집 패널 ── */
    #svc-extra-admin-panel {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      background: #12172b; color: white; z-index: 9100;
      box-shadow: 0 -4px 32px rgba(0,0,0,0.5);
    }
    .aep-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
      background: #0e1225; cursor: pointer; user-select: none;
    }
    .aep-header-left { display: flex; align-items: center; gap: 10px; }
    .aep-toggle-btn { background: none; border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: 4px; padding: 3px 10px; font-size: 0.72rem; cursor: pointer; }
    .aep-body { max-height: 55vh; overflow-y: auto; padding: 16px 20px; }

    /* 편집 블록 */
    .edit-block {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
    }
    .edit-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .edit-block-type { font-size: 0.68rem; letter-spacing: 0.12em; color: var(--gold); font-weight: 700; text-transform: uppercase; }
    .edit-block-del { background: none; border: 1px solid rgba(229,62,62,0.5); color: #fc8181; border-radius: 4px; padding: 2px 8px; font-size: 0.7rem; cursor: pointer; }
    .edit-block-del:hover { background: rgba(229,62,62,0.2); }
    .aep-field { margin-bottom: 10px; }
    .aep-field label { font-size: 0.68rem; color: rgba(255,255,255,0.55); letter-spacing: 0.08em; display: block; margin-bottom: 4px; }
    .aep-input {
      width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.18);
      color: white; border-radius: 5px; padding: 8px 10px; font-size: 0.82rem; box-sizing: border-box;
    }
    .aep-input:focus { border-color: var(--gold); outline: none; }
    textarea.aep-input { resize: vertical; }

    /* 블록 추가 버튼들 */
    .add-block-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 0 4px; }
    .add-block-btn {
      background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.75); border-radius: 5px; padding: 6px 14px;
      font-size: 0.75rem; cursor: pointer; transition: all 0.15s;
    }
    .add-block-btn:hover { background: rgba(212,175,55,0.2); border-color: var(--gold); color: var(--gold); }

    .aep-footer { padding: 10px 20px 14px; display: flex; align-items: center; justify-content: center; gap: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
    #extra-save-msg { font-size: 0.8rem; color: #68d391; display: none; }

    /* 기본 정보 편집 */
    .aep-base-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    @media (max-width: 600px) {
      .aep-base-grid { grid-template-columns: 1fr; }
      .svc-hero { height: 360px; }
      .svc-main { padding: 52px 0 80px; }
      .svc-cta { padding: 36px 20px; }
    }
  </style>
</head>
<body>

<!-- 히어로 -->
<section class="svc-hero">
  <img id="extra-hero-img" src="https://images.unsplash.com/photo-1512290923902-8a9f81dc236c?w=1400&auto=format&fit=crop" alt="" class="svc-hero__img">
  <div class="svc-hero__overlay"></div>
  <div class="svc-hero__content">
    <div class="container">
      <div class="svc-hero__breadcrumb">
        <a href="index.html">HOME</a> &nbsp;/&nbsp;
        <a href="service.html">SERVICE</a> &nbsp;/&nbsp;
        <span id="extra-breadcrumb-title">서비스</span>
      </div>
      <div class="svc-hero__num" id="extra-hero-num">SERVICE</div>
      <h1 class="svc-hero__title" id="extra-hero-title">서비스</h1>
      <p class="svc-hero__sub" id="extra-hero-sub"></p>
    </div>
  </div>
</section>

<!-- 본문 -->
<section class="svc-main section bg-cream">
  <div class="container" style="max-width:820px;">
    <div id="extra-content-area">
      <!-- JS로 렌더링 -->
    </div>
    <div class="svc-cta" id="extra-cta" style="display:none;">
      <h3 class="svc-cta__title" id="extra-cta-title">문의하기</h3>
      <p class="svc-cta__sub" id="extra-cta-sub">자세한 내용은 문의를 통해 알아보세요.</p>
      <a href="contact.html" class="btn btn--gold">온라인 문의</a>
    </div>
  </div>
</section>

<!-- 어드민 편집 패널 (admin 전용) -->
<div id="svc-extra-admin-panel">
  <div class="aep-header" onclick="toggleAepBody()">
    <div class="aep-header-left">
      <span style="font-size:0.82rem;font-weight:700;color:var(--gold);">✏ 서비스 페이지 편집</span>
      <span style="font-size:0.68rem;color:rgba(255,255,255,0.45);">**굵게** 지원 · 블록 자유 추가/삭제</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="extra-save-msg">✔ 저장!</span>
      <button class="aep-toggle-btn" id="aep-toggle-label">▲ 접기</button>
    </div>
  </div>
  <div id="aep-body-wrap" class="aep-body">
    <!-- 기본 정보 -->
    <div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.1);">
      <div style="font-size:0.72rem;color:var(--gold);letter-spacing:0.1em;margin-bottom:10px;font-weight:700;">기본 정보</div>
      <div class="aep-base-grid">
        <div class="aep-field"><label>제목</label><input type="text" id="ef-title" class="aep-input" placeholder="서비스 제목"></div>
        <div class="aep-field"><label>카드 설명 (짧게)</label><input type="text" id="ef-desc" class="aep-input" placeholder="서비스 목록에 표시되는 한 줄 설명"></div>
        <div class="aep-field" style="grid-column:1/-1;"><label>히어로 이미지 URL</label><input type="text" id="ef-img" class="aep-input" placeholder="https://..."></div>
      </div>
    </div>

    <!-- 콘텐츠 블록 목록 -->
    <div id="edit-blocks-list"></div>

    <!-- 블록 추가 버튼 -->
    <div class="add-block-bar">
      <button class="add-block-btn" onclick="addBlock('lead')">+ 리드 문단</button>
      <button class="add-block-btn" onclick="addBlock('section')">+ 섹션 (제목+본문)</button>
      <button class="add-block-btn" onclick="addBlock('box')">+ 박스 (옆 선)</button>
      <button class="add-block-btn" onclick="addBlock('box2')">+ 박스 2 (연배경)</button>
      <button class="add-block-btn" onclick="addBlock('sideline')">+ 사이드라인</button>
      <button class="add-block-btn" onclick="addBlock('qa')">+ Q&amp;A 항목</button>
      <button class="add-block-btn" onclick="addBlock('divider')">+ 구분선</button>
    </div>
  </div>
  <div class="aep-footer">
    <button onclick="saveExtraContent()" style="background:var(--gold);color:#12172b;border:none;border-radius:5px;padding:10px 36px;font-weight:700;cursor:pointer;font-size:0.88rem;">💾 저장</button>
    <button onclick="document.getElementById('svc-extra-admin-panel').style.display='none'" style="background:none;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.7);border-radius:5px;padding:10px 18px;cursor:pointer;font-size:0.82rem;">✕ 닫기</button>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  renderNavbar('service');
  renderFooter();

  const urlParams = new URLSearchParams(window.location.search);
  const SLUG = urlParams.get('slug') || 'extra_1';
  const NUM  = urlParams.get('num')  || '';

  const _isAdmin = (function() {
    const s = Auth.getSession && Auth.getSession();
    return s && s.username === 'admin';
  })();

  let _contents = [];

  /* ═══════════════════════════════════
     DB 로드 & 렌더링
  ═══════════════════════════════════ */
  async function loadExtraContent() {
    try {
      _contents = await SB.getAll('site_content', { limit: 500, order: 'sort_order.asc' });
      const get = k => (_contents.find(c => c.key === k) || {}).content || '';

      const title  = get(`service_${SLUG}_title`);
      const imgUrl = get(`service_${SLUG}_img`);
      const desc   = get(`service_${SLUG}_desc`);
      const blocksJson = get(`service_${SLUG}_blocks`);

      if (title) {
        document.getElementById('extra-hero-title').textContent = title;
        document.getElementById('extra-breadcrumb-title').textContent = title;
      }
      if (NUM) document.getElementById('extra-hero-num').textContent = NUM + ' · SERVICE';
      if (desc) document.getElementById('extra-hero-sub').textContent = desc;
      if (imgUrl) document.getElementById('extra-hero-img').src = imgUrl;

      // 블록 렌더링
      let blocks = [];
      try { blocks = blocksJson ? JSON.parse(blocksJson) : []; } catch(e) { blocks = []; }

      // 구버전 body 필드 마이그레이션
      if (!blocks.length) {
        const oldBody = get(`service_${SLUG}_body`);
        if (oldBody) blocks = [{ type: 'lead', body: oldBody }];
      }

      renderContentBlocks(blocks);

      if (title) document.getElementById('extra-cta').style.display = 'block';

      if (_isAdmin) {
        document.getElementById('svc-extra-admin-panel').style.display = 'block';
        document.getElementById('ef-title').value = title;
        document.getElementById('ef-desc').value = desc;
        document.getElementById('ef-img').value = imgUrl;
        renderEditBlocks(blocks);
      }
    } catch(e) { console.error('[service-extra]', e); }
  }

  /* ═══════════════════════════════════
     콘텐츠 렌더링
  ═══════════════════════════════════ */
  function md(str) {
    return (str || '').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  }

  function renderContentBlocks(blocks) {
    const area = document.getElementById('extra-content-area');
    if (!blocks.length) { area.innerHTML = ''; return; }
    area.innerHTML = blocks.map((b, i) => {
      switch(b.type) {
        case 'lead':
          return `<p class="svc-lead">${md(b.body)}</p>`;
        case 'section':
          return `<div class="svc-section">
            ${b.num ? `<div class="svc-section__num">${b.num}</div>` : ''}
            ${b.title ? `<h2 class="svc-section__title">${md(b.title)}</h2>` : ''}
            <div class="svc-section__body">${md(b.body)}</div>
          </div>`;
        case 'box':
          return `<div class="svc-box">
            ${b.label ? `<div class="svc-box__label">${md(b.label)}</div>` : ''}
            <div class="svc-box__body">${md(b.body)}</div>
          </div>`;
        case 'box2':
          return `<div style="background:#f5f5f5;border-left:4px solid #4a5568;border-radius:0 8px 8px 0;padding:18px 22px;margin:20px 0;">
            ${b.label ? `<div style="font-size:0.72rem;letter-spacing:0.15em;color:#4a5568;font-weight:700;margin-bottom:8px;">${md(b.label)}</div>` : ''}
            <div style="color:#555;line-height:1.9;">${md(b.body)}</div>
          </div>`;
        case 'sideline':
          return `<blockquote style="border-left:4px solid var(--gold);padding:12px 18px;margin:16px 0;color:#555;background:#fffdf5;font-style:italic;line-height:1.9;border-radius:0 6px 6px 0;">${md(b.body)}</blockquote>`;
        case 'qa':
          return `<div class="svc-qa-list">
            ${b.label ? `<div style="font-size:0.72rem;letter-spacing:0.15em;color:var(--gold);margin-bottom:10px;">${b.label}</div>` : ''}
            ${(b.items||[]).map(q=>`<div class="svc-qa-box">「${md(q)}」</div>`).join('')}
          </div>`;
        case 'divider':
          return `<hr class="svc-divider">`;
        default:
          return '';
      }
    }).join('');
  }

  /* ═══════════════════════════════════
     편집 블록 렌더링
  ═══════════════════════════════════ */
  let _editBlocks = [];

  function renderEditBlocks(blocks) {
    _editBlocks = blocks.map((b,i) => ({...b, _id: i}));
    rebuildEditBlocksUI();
  }

  function rebuildEditBlocksUI() {
    const list = document.getElementById('edit-blocks-list');
    if (!list) return;
    list.innerHTML = _editBlocks.map((b, idx) => buildEditBlockHtml(b, idx)).join('');
  }

  const BLOCK_LABELS = { lead:'리드 문단', section:'섹션', box:'박스 (옆 선)', box2:'박스 2 (연배경)', sideline:'사이드라인', qa:'Q&A 항목', divider:'구분선' };

  function buildEditBlockHtml(b, idx) {
    const s = `class="aep-input"`;
    const ta = (id, val, rows=3, ph='') =>
      `<textarea ${s} id="${id}" rows="${rows}" style="resize:vertical;" placeholder="${ph}">${(val||'').replace(/</g,'&lt;')}</textarea>`;
    const inp = (id, val, ph='') =>
      `<input type="text" ${s} id="${id}" value="${(val||'').replace(/"/g,'&quot;')}" placeholder="${ph}">`;

    let fields = '';
    switch(b.type) {
      case 'lead':
        fields = `<div class="aep-field"><label>문단 내용 (**굵게** 가능)</label>${ta(`eb-${idx}-body`, b.body, 4, '리드 문단 텍스트를 입력하세요.')}</div>`;
        break;
      case 'section':
        fields = `
          <div class="aep-field"><label>섹션 번호 (선택, 예: 01 · THE KEY)</label>${inp(`eb-${idx}-num`, b.num, '01 · THE KEY')}</div>
          <div class="aep-field"><label>섹션 제목</label>${inp(`eb-${idx}-title`, b.title, '섹션 제목')}</div>
          <div class="aep-field"><label>섹션 본문 (**굵게**, 줄바꿈 가능)</label>${ta(`eb-${idx}-body`, b.body, 5, '섹션 본문을 입력하세요.')}</div>`;
        break;
      case 'box':
        fields = `
          <div class="aep-field"><label>박스 라벨 (선택, 예: 검색 프로세스)</label>${inp(`eb-${idx}-label`, b.label, '예: 🔍 검색 프로세스')}</div>
          <div class="aep-field"><label>박스 내용 (**굵게**, 줄바꿈 가능)</label>${ta(`eb-${idx}-body`, b.body, 4, '박스 안에 들어갈 내용을 입력하세요.')}</div>`;
        break;
      case 'box2':
        fields = `
          <div class="aep-field"><label>박스2 라벨 (선택)</label>${inp(`eb-${idx}-label`, b.label, '예: 포인트')}</div>
          <div class="aep-field"><label>박스2 내용 (**굵게**, 줄바꿈 가능)</label>${ta(`eb-${idx}-body`, b.body, 4, '박스 안에 들어갈 내용을 입력하세요.')}</div>`;
        break;
      case 'sideline':
        fields = `<div class="aep-field"><label>사이드라인 내용 (**굵게** 가능)</label>${ta(`eb-${idx}-body`, b.body, 3, '사이드라인으로 강조할 내용')}</div>`;
        break;
      case 'qa':
        const items = (b.items || []).join('\n');
        fields = `
          <div class="aep-field"><label>Q&A 라벨 (선택, 예: 💬 대화 예시)</label>${inp(`eb-${idx}-label`, b.label, '💬 대화 예시')}</div>
          <div class="aep-field"><label>항목들 (한 줄에 하나씩 입력)</label>${ta(`eb-${idx}-items`, items, 4, '당신은 장남입니까?\n아버님 성함의 첫 글자는 ○○입니까?')}</div>`;
        break;
      case 'divider':
        fields = `<div style="font-size:0.75rem;color:rgba(255,255,255,0.45);padding:4px 0;">— 수평 구분선이 삽입됩니다 —</div>`;
        break;
    }

    return `<div class="edit-block" data-idx="${idx}">
      <div class="edit-block-header">
        <span class="edit-block-type">${BLOCK_LABELS[b.type]||b.type}</span>
        <div style="display:flex;gap:6px;">
          ${idx > 0 ? `<button class="aep-toggle-btn" onclick="moveBlock(${idx},-1)" title="위로">↑</button>` : ''}
          ${idx < _editBlocks.length-1 ? `<button class="aep-toggle-btn" onclick="moveBlock(${idx},1)" title="아래로">↓</button>` : ''}
          <button class="edit-block-del" onclick="removeBlock(${idx})">✕ 삭제</button>
        </div>
      </div>
      ${fields}
    </div>`;
  }

  function addBlock(type) {
    const defaults = { lead:{type:'lead',body:''}, section:{type:'section',num:'',title:'',body:''}, box:{type:'box',label:'',body:''}, box2:{type:'box2',label:'',body:''}, sideline:{type:'sideline',body:''}, qa:{type:'qa',label:'',items:[]}, divider:{type:'divider'} };
    _editBlocks.push({...(defaults[type]||{type}), _id: Date.now()});
    rebuildEditBlocksUI();
    // 스크롤 맨 아래로
    setTimeout(()=>{ const el = document.getElementById('edit-blocks-list'); if(el) el.lastElementChild?.scrollIntoView({behavior:'smooth'}); }, 50);
  }

  function removeBlock(idx) {
    _editBlocks.splice(idx, 1);
    rebuildEditBlocksUI();
  }

  function moveBlock(idx, dir) {
    const target = idx + dir;
    if (target < 0 || target >= _editBlocks.length) return;
    [_editBlocks[idx], _editBlocks[target]] = [_editBlocks[target], _editBlocks[idx]];
    rebuildEditBlocksUI();
  }

  function collectBlocks() {
    return _editBlocks.map((b, idx) => {
      const g = id => (document.getElementById(id)||{}).value || '';
      switch(b.type) {
        case 'lead':    return { type:'lead', body: g(`eb-${idx}-body`) };
        case 'section': return { type:'section', num: g(`eb-${idx}-num`), title: g(`eb-${idx}-title`), body: g(`eb-${idx}-body`) };
        case 'box':     return { type:'box', label: g(`eb-${idx}-label`), body: g(`eb-${idx}-body`) };
        case 'box2':    return { type:'box2', label: g(`eb-${idx}-label`), body: g(`eb-${idx}-body`) };
        case 'sideline': return { type:'sideline', body: g(`eb-${idx}-body`) };
        case 'qa':      return { type:'qa', label: g(`eb-${idx}-label`), items: g(`eb-${idx}-items`).split('\n').map(s=>s.trim()).filter(Boolean) };
        case 'divider': return { type:'divider' };
        default: return b;
      }
    });
  }

  async function saveExtraContent() {
    try {
      const blocks = collectBlocks();
      const saves = [
        [`service_${SLUG}_title`,  document.getElementById('ef-title').value],
        [`service_${SLUG}_desc`,   document.getElementById('ef-desc').value],
        [`service_${SLUG}_img`,    document.getElementById('ef-img').value],
        [`service_${SLUG}_blocks`, JSON.stringify(blocks)],
      ];
      for (const [key, value] of saves) await extraUpsert(key, value);

      const msg = document.getElementById('extra-save-msg');
      if (msg) { msg.style.display='inline'; setTimeout(()=>msg.style.display='none',3000); }
      await loadExtraContent();
    } catch(e) { alert('저장 실패: ' + e.message); }
  }

  async function extraUpsert(key, value) {
    const existing = _contents.find(c => c.key === key);
    if (existing) {
      await SB.update('site_content', existing.id, { content: value });
    } else {
      await SB.insert('site_content', { key, content: value, label: key, section: 'service_extra', sort_order: 0 });
    }
  }

  function toggleAepBody() {
    const wrap = document.getElementById('aep-body-wrap');
    const lbl  = document.getElementById('aep-toggle-label');
    if (!wrap) return;
    const isOpen = wrap.style.display !== 'none';
    wrap.style.display = isOpen ? 'none' : 'block';
    if (lbl) lbl.textContent = isOpen ? '▼ 펼치기' : '▲ 접기';
  }

  loadExtraContent();
</script>
</body>
</html>
