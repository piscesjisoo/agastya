<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소식 · 기사 | 빛의 아갈탄</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 필터 탭 */
    .filter-tabs {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 40px; justify-content: center;
    }
    .filter-tab {
      padding: 8px 22px;
      font-size: 0.78rem; letter-spacing: 0.1em;
      border: 1px solid var(--border); border-radius: 2px;
      cursor: pointer; background: white; color: var(--text-mid);
      transition: var(--transition);
    }
    .filter-tab:hover, .filter-tab.active {
      background: var(--navy); color: white; border-color: var(--navy);
    }

    /* 피처드 영역 */
    .featured-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 28px;
      margin-bottom: 64px;
    }
    .featured-main {
      position: relative; border-radius: 2px; overflow: hidden;
      cursor: pointer;
    }
    .featured-main__img {
      width: 100%; height: 420px; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .featured-main:hover .featured-main__img { transform: scale(1.03); }
    .featured-main__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(15,22,36,0.9) 0%, rgba(15,22,36,0.1) 60%);
    }
    .featured-main__body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 32px;
    }
    .featured-main__cat {
      font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
      display: inline-block; background: rgba(200,151,58,0.15);
      padding: 3px 10px; border-radius: 2px;
    }
    .featured-main__title {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1rem, 2vw, 1.35rem); font-weight: 500;
      color: white; line-height: 1.5; margin-bottom: 8px;
    }
    .featured-main__sub { font-size: 0.82rem; color: rgba(255,255,255,0.7); }
    .featured-main__date { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 10px; }

    /* 사이드 피처드 */
    .featured-side { display: flex; flex-direction: column; gap: 16px; }
    .featured-side-item {
      display: flex; gap: 16px; align-items: flex-start;
      border: 1px solid var(--border); border-radius: 2px;
      overflow: hidden; cursor: pointer; transition: var(--transition);
      background: white;
    }
    .featured-side-item:hover { box-shadow: var(--shadow-md); transform: translateX(3px); }
    .featured-side-item__img {
      width: 110px; height: 90px; object-fit: cover; flex-shrink: 0;
    }
    .featured-side-item__body { padding: 14px 14px 14px 0; flex: 1; }
    .featured-side-item__cat {
      font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 5px;
    }
    .featured-side-item__title {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.88rem; font-weight: 500;
      color: var(--text-dark); line-height: 1.5; margin-bottom: 5px;
    }
    .featured-side-item__date { font-size: 0.72rem; color: var(--text-light); }

    /* 구분선 */
    .section-divider {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 32px;
    }
    .section-divider__label {
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-light); white-space: nowrap; font-weight: 600;
    }
    .section-divider__line { flex: 1; height: 1px; background: var(--border); }
    .section-divider__line--gold { background: var(--gold); width: 40px; flex: none; }

    /* 일반 카드 그리드 */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
    }
    .news-card {
      background: white; border: 1px solid var(--border);
      border-radius: 2px; overflow: hidden;
      cursor: pointer; transition: var(--transition);
      display: flex; flex-direction: column;
    }
    .news-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
    .news-card__img-wrap { height: 200px; overflow: hidden; }
    .news-card__img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .news-card:hover .news-card__img { transform: scale(1.04); }
    .news-card__body { padding: 22px; flex: 1; display: flex; flex-direction: column; }
    .news-card__cat {
      font-size: 0.66rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 8px;
    }
    .news-card__title {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.98rem; font-weight: 500;
      color: var(--text-dark); line-height: 1.55; margin-bottom: 8px;
    }
    .news-card__sub { font-size: 0.8rem; color: var(--text-light); margin-bottom: 14px; }
    .news-card__footer {
      margin-top: auto; display: flex; align-items: center;
      justify-content: space-between; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .news-card__date { font-size: 0.72rem; color: var(--text-light); }

    /* 더보기 버튼 */
    .load-more-wrap { text-align: center; margin-top: 48px; }

    /* 빈 상태 */
    .empty-state {
      text-align: center; padding: 80px 20px;
      color: var(--text-light); grid-column: 1 / -1;
    }
    .empty-state__icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }

    /* 스켈레톤 */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 3px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    @media (max-width: 900px) {
      .featured-grid { grid-template-columns: 1fr; }
      .featured-main__img { height: 280px; }
      .news-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .news-grid { grid-template-columns: 1fr; }
      .featured-side-item__img { width: 90px; height: 75px; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <span class="page-header__label">NEWS & ARTICLES</span>
  <h1 class="page-header__title">소식 · 기사</h1>
  <p class="page-header__sub">빛의 아갈탄의 최신 소식과 활동을 전해드립니다</p>
</div>

<section class="section">
  <div class="container">

    <!-- 필터 탭 -->
    <div style="position:relative;">
      <div class="filter-tabs" id="filter-tabs">
        <button class="filter-tab active" data-cat="전체">전체</button>
        <button class="filter-tab" data-cat="이벤트">이벤트</button>
        <button class="filter-tab" data-cat="공지">공지</button>
        <button class="filter-tab" data-cat="기사">기사</button>
        <button class="filter-tab" data-cat="활동보고">활동 보고</button>
        <button class="filter-tab" data-cat="동영상">동영상</button>
      </div>
      <!-- 관리자만 보이는 카테고리 편집 버튼 (오른쪽 위에 별도 배치) -->
      <button id="news-cat-edit-btn" onclick="openNewsCatModal()" style="display:none;position:absolute;top:-40px;right:0;padding:5px 12px;background:#1a2a4a;color:white;border:none;border-radius:6px;font-size:0.75rem;cursor:pointer;">⚙ 카테고리 편집</button>
    </div>

    <!-- 카테고리 편집 모달 -->
    <div id="news-cat-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
      <div style="background:white;border-radius:12px;padding:32px;width:90%;max-width:440px;box-shadow:0 8px 40px rgba(0,0,0,0.2);">
        <div style="font-size:1.1rem;font-weight:700;color:#1a2a4a;margin-bottom:6px;">📂 카테고리 편집</div>
        <div style="font-size:0.8rem;color:#888;margin-bottom:16px;">콤마(,)로 구분하여 입력하세요</div>
        <input id="news-cat-input" type="text" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.95rem;box-sizing:border-box;margin-bottom:8px;" placeholder="이벤트, 공지, 기사, 활동보고, 동영상">
        <div style="font-size:0.75rem;color:#aaa;margin-bottom:18px;">※ '전체' 탭은 자동으로 포함됩니다</div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button onclick="closeNewsCatModal()" style="padding:9px 20px;border:1px solid #ddd;border-radius:6px;background:white;cursor:pointer;">취소</button>
          <button onclick="saveNewsCategories()" style="padding:9px 20px;background:#b8963e;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:600;">저장</button>
        </div>
      </div>
    </div>

    <!-- 주요 기사 (피처드) -->
    <div id="featured-section">
      <div class="section-divider">
        <div class="section-divider__line--gold"></div>
        <div class="section-divider__label">FEATURED</div>
        <div class="section-divider__line"></div>
      </div>
      <div class="featured-grid" id="featured-grid">
        <!-- 스켈레톤 -->
        <div class="skeleton" style="height:420px;border-radius:2px;"></div>
        <div class="featured-side">
          <div class="skeleton" style="height:90px;border-radius:2px;"></div>
          <div class="skeleton" style="height:90px;border-radius:2px;"></div>
          <div class="skeleton" style="height:90px;border-radius:2px;"></div>
        </div>
      </div>
    </div>

    <!-- 전체 목록 -->
    <div class="section-divider" style="margin-top:56px;">
      <div class="section-divider__line--gold"></div>
      <div class="section-divider__label">LATEST ARTICLES</div>
      <div class="section-divider__line"></div>
    </div>

    <div class="news-grid" id="news-grid">
      <!-- JS로 렌더링 -->
    </div>

    <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
      <button class="btn btn--outline" id="load-more-btn" onclick="loadMore()">더 보기</button>
    </div>
  </div>
</section>

<!-- ══════ 관리자 기사 편집 모달 ══════ -->
<div id="news-edit-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;overflow-y:auto;padding:40px 16px;">
  <div style="background:white;border-radius:12px;max-width:680px;margin:0 auto;padding:36px 32px;box-shadow:0 16px 60px rgba(0,0,0,0.25);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
      <h2 id="nem-modal-title" style="font-size:1.2rem;color:#1a2a4a;margin:0;">기사 추가</h2>
      <button onclick="closeNewsEditModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:#888;">×</button>
    </div>
    <input type="hidden" id="nem-id">
    <div style="display:grid;gap:14px;">
      <div>
        <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">제목 <span style="color:red;">*</span></label>
        <input id="nem-title" type="text" placeholder="기사 제목" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.95rem;box-sizing:border-box;">
      </div>
      <div>
        <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">부제목</label>
        <input id="nem-subtitle" type="text" placeholder="부제목 (선택)" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.95rem;box-sizing:border-box;">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">카테고리</label>
          <select id="nem-category" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.9rem;">
            <option>이벤트</option><option>공지</option><option>기사</option><option>활동보고</option><option>동영상</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">발행 상태</label>
          <select id="nem-status" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.9rem;">
            <option value="발행">발행</option>
            <option value="비공개">비공개</option>
            <option value="초안">초안</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">발행일</label>
          <input id="nem-date" type="date" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.9rem;">
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">메인 노출</label>
          <label style="display:flex;align-items:center;gap:8px;margin-top:12px;cursor:pointer;">
            <input type="checkbox" id="nem-featured" style="width:18px;height:18px;accent-color:#b8963e;"> 피처드(메인) 노출
          </label>
        </div>
      </div>
      <div>
        <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">이미지 URL</label>
        <input id="nem-image" type="url" placeholder="https://images.unsplash.com/..." style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.9rem;box-sizing:border-box;" oninput="previewNemImage(this.value)">
        <div id="nem-img-preview-wrap" style="display:none;margin-top:8px;border-radius:6px;overflow:hidden;border:1px solid #e0e0e0;">
          <img id="nem-img-preview" src="" alt="" style="width:100%;max-height:160px;object-fit:cover;display:block;">
        </div>
        <div style="background:#fffbea;border:1px solid #f6d860;border-radius:5px;padding:8px 10px;font-size:0.74rem;color:#7a5c00;margin-top:7px;line-height:1.6;">
          📸 <strong>무료 고화질 이미지:</strong> <a href="https://unsplash.com" target="_blank" rel="noopener" style="color:#b8860b;font-weight:600;text-decoration:underline;">Unsplash.com</a>에서 이미지 검색 → 클릭 → 우클릭 → <em>「이미지 주소 복사」</em> 후 붙여넣으세요.
        </div>
      </div>
      <div>
        <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">유튜브 URL</label>
        <input id="nem-youtube" type="url" placeholder="https://youtu.be/..." style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.9rem;box-sizing:border-box;">
      </div>
      <div>
        <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">본문 내용</label>
        <textarea id="nem-content" rows="8" placeholder="본문 내용을 입력하세요" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.9rem;box-sizing:border-box;resize:vertical;"></textarea>
      </div>
      <div>
        <label style="display:block;font-size:0.8rem;color:#555;margin-bottom:5px;font-weight:600;">태그 (쉼표 구분)</label>
        <input id="nem-tags" type="text" placeholder="태그1, 태그2" style="width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:0.9rem;box-sizing:border-box;">
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:24px;gap:10px;">
      <button id="nem-delete-btn" onclick="deleteNewsInline()" style="display:none;padding:11px 20px;border:1.5px solid #e53e3e;color:#c53030;background:white;border-radius:7px;cursor:pointer;font-size:0.9rem;">🗑 삭제</button>
      <div style="display:flex;gap:10px;margin-left:auto;">
        <button onclick="closeNewsEditModal()" style="padding:11px 24px;border:1.5px solid #ddd;border-radius:7px;background:white;cursor:pointer;">취소</button>
        <button onclick="saveNewsInline()" style="padding:11px 24px;background:#b8963e;color:white;border:none;border-radius:7px;cursor:pointer;font-weight:700;">저장</button>
      </div>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  renderNavbar('news');
  renderFooter();

  let allNews = [];
  let currentFilter = '전체';
  let displayCount = 9;
  let newsCategories = ['이벤트','공지','기사','활동보고','동영상'];

  /* ── 카테고리 편집 모달 ── */
  function openNewsCatModal() {
    document.getElementById('news-cat-input').value = newsCategories.join(', ');
    document.getElementById('news-cat-modal').style.display = 'flex';
  }
  function closeNewsCatModal() {
    document.getElementById('news-cat-modal').style.display = 'none';
  }
  async function saveNewsCategories() {
    const val = document.getElementById('news-cat-input').value.trim();
    if (!val) { alert('카테고리를 입력해주세요.'); return; }
    newsCategories = val.split(',').map(c => c.trim()).filter(c => c);
    renderNewsCategoryTabs();
    closeNewsCatModal();
    // site_content DB에 저장
    try {
      await SB.upsertContent('news_categories', newsCategories.join(','), '소식 카테고리', 'news', 0);
      alert('카테고리가 저장되었습니다!');
    } catch(e) { alert('저장 중 오류가 발생했습니다.'); }
  }
  function renderNewsCategoryTabs() {
    const tabs = document.getElementById('filter-tabs');
    tabs.innerHTML = `<button class="filter-tab active" data-cat="전체">전체</button>` +
      newsCategories.map(c => `<button class="filter-tab" data-cat="${c}">${c}</button>`).join('');
  }
  async function loadNewsCategories() {
    try {
      const saved = await SB.findOne('site_content', 'key', 'news_categories');
      if (saved && saved.content) {
        newsCategories = saved.content.split(',').map(c => c.trim()).filter(c => c);
        renderNewsCategoryTabs();
      }
    } catch(e) {}
    // 관리자면 편집 버튼 표시
    if (Auth.isAdmin()) document.getElementById('news-cat-edit-btn').style.display = 'block';
  }

  /* ── 뉴스 로드 ── */
  async function loadNews() {
    try {
      const rows = await SB.getAll('news', { limit: 200, order: 'published_date.desc' });
      allNews = rows.filter(n => n.status === '발행');
      renderAll();
    } catch(e) {
      document.getElementById('news-grid').innerHTML =
        '<div class="empty-state"><div class="empty-state__icon">⚠️</div><p>데이터를 불러오지 못했습니다.</p></div>';
    }
  }

  function renderAll() {
    const filtered = currentFilter === '전체'
      ? allNews
      : allNews.filter(n => n.category === currentFilter);
    renderFeatured(filtered.filter(n => n.is_featured));
    renderGrid(filtered);
  }

  /* ── 피처드 렌더 ── */
  function renderFeatured(items) {
    const section = document.getElementById('featured-section');
    if (!items.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    const main = items[0];
    const sides = items.slice(1, 4);

    document.getElementById('featured-grid').innerHTML = `
      <div class="featured-main" onclick="goDetail('${main.id}')">
        <img src="${(main.image_url && main.image_url.startsWith('http')) ? main.image_url : 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800'}"
             alt="${main.title}" class="featured-main__img"
             onerror="this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800'">
        <div class="featured-main__overlay"></div>
        <div class="featured-main__body">
          <span class="featured-main__cat">${main.category || ''}</span>
          <h2 class="featured-main__title">${main.title}</h2>
          <p class="featured-main__sub">${main.subtitle || ''}</p>
          <div class="featured-main__date">📅 ${main.published_date || ''}</div>
        </div>
      </div>
      <div class="featured-side">
        ${sides.length ? sides.map(n => `
          <div class="featured-side-item" onclick="goDetail('${n.id}')">
            <img src="${(n.image_url && n.image_url.startsWith('http')) ? n.image_url : 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400'}"
                 alt="${n.title}" class="featured-side-item__img"
                 onerror="this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400'">
            <div class="featured-side-item__body">
              <div class="featured-side-item__cat">${n.category || ''}</div>
              <div class="featured-side-item__title">${n.title}</div>
              <div class="featured-side-item__date">${n.published_date || ''}</div>
            </div>
          </div>`).join('')
        : '<p style="color:var(--text-light);font-size:0.85rem;padding:20px 0;">주요 기사가 없습니다.</p>'}
      </div>`;
  }

  /* ── 그리드 렌더 ── */
  function renderGrid(items) {
    const grid = document.getElementById('news-grid');
    const loadMoreWrap = document.getElementById('load-more-wrap');
    const shown = items.slice(0, displayCount);

    if (!items.length) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-state__icon">🔍</div><p>해당 카테고리의 기사가 없습니다.</p></div>';
      loadMoreWrap.style.display = 'none';
      return;
    }

    grid.innerHTML = shown.map(n => {
      // YouTube 썸네일 자동 사용
      const ytUrl = n.youtube_url || n.video_url || '';
      let thumbUrl = (n.image_url && n.image_url.startsWith('http')) ? n.image_url : 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600';
      if (!n.image_url && ytUrl) {
        const ytMatch = ytUrl.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([^?&\s]+)/);
        if (ytMatch) thumbUrl = `https://img.youtube.com/vi/${ytMatch[1]}/hqdefault.jpg`;
      }
      return `
      <div class="news-card" onclick="goDetail('${n.id}')">
        <div class="news-card__img-wrap" style="position:relative;">
          <img src="${thumbUrl}"
               alt="${n.title}" class="news-card__img"
               onerror="this.src='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600'">
          ${ytUrl ? `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(220,0,0,0.88);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;pointer-events:none;"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>` : ''}
        </div>
        <div class="news-card__body">
          <div class="news-card__cat">${n.category || ''}</div>
          <h3 class="news-card__title">${n.title}</h3>
          <p class="news-card__sub">${n.subtitle || ''}</p>
          <div class="news-card__footer">
            <span class="news-card__date">📅 ${n.published_date || ''}</span>
            <span class="badge badge--gold" style="font-size:0.65rem;">${ytUrl ? '▶ 영상' : 'MORE →'}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    loadMoreWrap.style.display = items.length > displayCount ? 'block' : 'none';
  }

  function loadMore() {
    displayCount += 9;
    const filtered = currentFilter === '전체' ? allNews : allNews.filter(n => n.category === currentFilter);
    renderGrid(filtered);
  }

  function goDetail(id) {
    window.location.href = `news-detail.html?id=${id}`;
  }

  /* ── 필터 탭 ── */
  document.getElementById('filter-tabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.cat;
    displayCount = 9;
    renderAll();
  });

  loadNewsCategories();
  loadNews();

  /* ══════════════════════════════════
     관리자 인라인 기사 관리
  ══════════════════════════════════ */
  let _allNewsAdmin = []; // 전체 기사 캐시 (loadNews에서 채움)

  // 관리자 버튼 초기화
  function initAdminNewsUI() {
    if (!Auth.isAdmin()) return;
    // 기사 추가 버튼
    if (!document.getElementById('admin-news-add-btn')) {
      const addBtn = document.createElement('button');
      addBtn.id = 'admin-news-add-btn';
      addBtn.innerHTML = '+ 기사 추가';
      addBtn.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9000;padding:14px 22px;background:#b8963e;color:white;border:none;border-radius:50px;font-size:0.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.25);';
      addBtn.onclick = () => openNewsEditModal(null);
      document.body.appendChild(addBtn);
    }
    // 관리자 패널 링크
    if (!document.getElementById('admin-panel-link')) {
      const lnk = document.createElement('a');
      lnk.id = 'admin-panel-link';
      lnk.href = 'admin.html';
      lnk.style.cssText = 'position:fixed;bottom:24px;left:24px;z-index:9000;padding:10px 18px;background:#1a2a4a;color:white;border-radius:50px;font-size:0.82rem;text-decoration:none;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.2);';
      lnk.textContent = '🔒 관리자 패널';
      document.body.appendChild(lnk);
    }
  }

  function previewNemImage(url) {
    const wrap = document.getElementById('nem-img-preview-wrap');
    const prev = document.getElementById('nem-img-preview');
    if (url && url.startsWith('http')) {
      prev.src = url;
      prev.onerror = function() { wrap.style.display = 'none'; };
      wrap.style.display = 'block';
    } else {
      wrap.style.display = 'none';
      prev.src = '';
    }
  }

  function openNewsEditModal(news) {
    if (!Auth.isAdmin()) return;
    document.getElementById('nem-id').value = news ? news.id : '';
    document.getElementById('nem-title').value = news ? (news.title || '') : '';
    document.getElementById('nem-subtitle').value = news ? (news.subtitle || '') : '';
    document.getElementById('nem-content').value = news ? (news.content || '') : '';
    document.getElementById('nem-youtube').value = news ? (news.youtube_url || '') : '';
    const imgUrl = news ? (news.image_url || '') : '';
    document.getElementById('nem-image').value = imgUrl;
    previewNemImage(imgUrl);
    document.getElementById('nem-tags').value = news ? (news.tags || '') : '';
    document.getElementById('nem-featured').checked = news ? !!news.is_featured : false;
    document.getElementById('nem-date').value = news ? (news.published_date || getTodayStr()) : getTodayStr();
    document.getElementById('nem-category').value = news ? (news.category || '이벤트') : '이벤트';
    document.getElementById('nem-status').value = news ? (news.status || '발행') : '발행';
    document.getElementById('nem-modal-title').textContent = news ? '기사 편집' : '기사 추가';
    document.getElementById('nem-delete-btn').style.display = news ? 'block' : 'none';
    document.getElementById('news-edit-modal').style.display = 'block';
  }

  function closeNewsEditModal() {
    document.getElementById('news-edit-modal').style.display = 'none';
  }

  function getTodayStr() { return new Date().toISOString().split('T')[0]; }

  async function saveNewsInline() {
    const id = document.getElementById('nem-id').value.trim();
    const title = document.getElementById('nem-title').value.trim();
    if (!title) { alert('제목을 입력해주세요.'); return; }
    const payload = {
      title,
      subtitle: document.getElementById('nem-subtitle').value.trim(),
      category: document.getElementById('nem-category').value,
      status: document.getElementById('nem-status').value,
      published_date: document.getElementById('nem-date').value,
      is_featured: document.getElementById('nem-featured').checked,
      image_url: document.getElementById('nem-image').value.trim(),
      youtube_url: document.getElementById('nem-youtube').value.trim(),
      content: document.getElementById('nem-content').value.trim(),
      tags: document.getElementById('nem-tags').value.trim(),
    };
    const saveBtn = document.querySelector('#news-edit-modal button[onclick="saveNewsInline()"]');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }
    console.log('[saveNewsInline] id:', id, ' payload.title:', payload.title);
    try {
      if (id) {
        console.log('[saveNewsInline] UPDATE 시도 - id:', id);
        await SB.update('news', id, payload);
      } else {
        console.log('[saveNewsInline] INSERT 시도');
        await SB.insert('news', payload);
      }
      closeNewsEditModal();
      // 데이터 재로드
      const rows = await SB.getAll('news', { limit: 200, order: 'published_date.desc' });
      _allNewsAdmin = rows;
      allNews = rows.filter(n => n.status === '발행');
      renderAll();
      alert(id ? '기사가 수정되었습니다.' : '기사가 추가되었습니다.');
    } catch(e) {
      alert('저장 실패: ' + e.message);
    } finally {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '저장'; }
    }
  }

  async function deleteNewsInline() {
    const id = document.getElementById('nem-id').value.trim();
    if (!id || !confirm('이 기사를 삭제하시겠습니까?')) return;
    try {
      const ok = await SB.remove('news', id);
      if (!ok) { alert('삭제에 실패했습니다. 다시 시도해주세요.'); return; }
      closeNewsEditModal();
      const rows = await SB.getAll('news', { limit: 200, order: 'published_date.desc' });
      _allNewsAdmin = rows;
      allNews = rows.filter(n => n.status === '발행');
      renderAll();
      alert('삭제되었습니다.');
    } catch(e) { alert('삭제 실패: ' + e.message); }
  }

  // 관리자 카드에 편집 버튼 표시
  function renderAdminCards() {
    if (!Auth.isAdmin()) return;
    // news-grid 카드들에 편집 버튼 추가
    document.querySelectorAll('.news-card').forEach(card => {
      if (card.querySelector('.admin-edit-btn')) return;
      const onclick = card.getAttribute('onclick') || '';
      const idMatch = onclick.match(/goDetail\('([^']+)'\)/);
      if (!idMatch) return;
      const nId = idMatch[1];
      const btn = document.createElement('button');
      btn.className = 'admin-edit-btn';
      btn.textContent = '✏ 편집';
      btn.style.cssText = 'position:absolute;top:8px;right:8px;z-index:10;padding:4px 10px;background:#1a2a4a;color:white;border:none;border-radius:4px;font-size:0.72rem;cursor:pointer;';
      btn.onclick = (e) => { e.stopPropagation(); const n = _allNewsAdmin.find(x=>x.id===nId); if(n) openNewsEditModal(n); };
      card.style.position = 'relative';
      card.appendChild(btn);
    });
    // featured 카드들에도 추가
    document.querySelectorAll('.featured-main, .featured-side-item').forEach(card => {
      if (card.querySelector('.admin-edit-btn')) return;
      const onclick = card.getAttribute('onclick') || '';
      const idMatch = onclick.match(/goDetail\('([^']+)'\)/);
      if (!idMatch) return;
      const nId = idMatch[1];
      const btn = document.createElement('button');
      btn.className = 'admin-edit-btn';
      btn.textContent = '✏ 편집';
      btn.style.cssText = 'position:absolute;top:8px;right:8px;z-index:10;padding:4px 10px;background:#1a2a4a;color:white;border:none;border-radius:4px;font-size:0.72rem;cursor:pointer;';
      btn.onclick = (e) => { e.stopPropagation(); const n = _allNewsAdmin.find(x=>x.id===nId); if(n) openNewsEditModal(n); };
      card.appendChild(btn);
    });
  }

  // 관리자 초기화
  if (Auth.isAdmin()) {
    initAdminNewsUI();
  }
</script>
</body>
</html>
