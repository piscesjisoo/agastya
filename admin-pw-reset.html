<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 계정 생성</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; background: #f9f6f1; }
    .card { background: white; border-radius: 10px; padding: 40px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
    h2 { color: #1a2a4a; margin-bottom: 6px; }
    .sub { color: #888; font-size: 0.85rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; color: #444; margin: 14px 0 5px; font-weight: 600; }
    input { width: 100%; padding: 11px 13px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 0.95rem; box-sizing: border-box; }
    input:focus { outline: none; border-color: #b8963e; }
    button { width: 100%; margin-top: 22px; padding: 14px; background: #b8963e; color: white; border: none; border-radius: 7px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:hover { background: #9a7a2e; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .result { margin-top: 18px; padding: 16px; border-radius: 8px; font-size: 0.9rem; line-height: 1.7; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
    .error   { background: #fdecea; color: #c62828; border: 1px solid #ef9a9a; display: block; }
    .go-btn  { display: block; text-align: center; margin-top: 16px; padding: 12px; background: #1a2a4a; color: white; border-radius: 7px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
<div class="card">
  <h2>🔐 관리자 계정 생성</h2>
  <p class="sub">계정이 없으면 새로 만들고, 있으면 비밀번호를 재설정합니다.</p>

  <label>아이디</label>
  <input type="text" id="inp-username" value="admin">

  <label>비밀번호</label>
  <input type="password" id="inp-password" value="admin5162">

  <label>이름</label>
  <input type="text" id="inp-name" value="관리자">

  <label>이메일</label>
  <input type="email" id="inp-email" value="kor.agastya@gmail.com">

  <button id="btn" onclick="run()">관리자 계정 생성하기</button>

  <div class="result" id="result"></div>
  <a class="go-btn" href="login.html" id="go-login" style="display:none;">→ 로그인 페이지로 이동</a>
</div>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script>
  const ITER = 100000;

  function generateSalt() {
    const arr = crypto.getRandomValues(new Uint8Array(16));
    return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function hashPassword(pw) {
    const salt = generateSalt();
    const enc  = new TextEncoder();
    const key  = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveBits']);
    const bits = await crypto.subtle.deriveBits(
      { name:'PBKDF2', hash:'SHA-256', salt: enc.encode(salt), iterations: ITER },
      key, 256
    );
    const hex = Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2,'0')).join('');
    return `pbkdf2:${salt}:${hex}`;
  }

  function show(msg, type) {
    const el = document.getElementById('result');
    el.innerHTML = msg;
    el.className = 'result ' + type;
  }

  async function run() {
    const username = document.getElementById('inp-username').value.trim();
    const password = document.getElementById('inp-password').value.trim();
    const name     = document.getElementById('inp-name').value.trim();
    const email    = document.getElementById('inp-email').value.trim();

    if (!username || !password) { show('아이디와 비밀번호를 입력하세요.', 'error'); return; }
    if (password.length < 6)    { show('비밀번호는 6자 이상이어야 합니다.', 'error'); return; }

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    show('비밀번호 암호화 중...', 'result');

    try {
      // 1. 비밀번호 해싱
      const password_hash = await hashPassword(password);

      // 2. 기존 계정 확인
      const existing = await SB.findOne('users', 'username', username);

      if (existing) {
        await SB.update('users', existing.id, { password_hash, name, email, role: 'admin', is_active: true });
        show(`✅ 비밀번호가 변경되었습니다!<br>아이디: <b>${username}</b><br>비밀번호: <b>${password}</b>`, 'success');
      } else {
        await SB.insert('users', {
          username, password_hash, name, email,
          phone: '', role: 'admin', is_active: true,
          reset_code: '', reset_code_expires: ''
        });
        show(`✅ 관리자 계정이 생성되었습니다!<br>아이디: <b>${username}</b><br>비밀번호: <b>${password}</b>`, 'success');
      }

      document.getElementById('go-login').style.display = 'block';
      btn.textContent = '완료!';

    } catch(e) {
      show('❌ 오류: ' + e.message, 'error');
      btn.disabled = false;
      btn.textContent = '관리자 계정 생성하기';
    }
  }
</script>
</body>
</html>
